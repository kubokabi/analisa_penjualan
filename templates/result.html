<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hasil Scraping</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-KyZXEJ6Hk3o5tV34k5gvmQ3dV7rJq21l6G3k1UM6IjjS5tBxB6o5bmbmn5S63bjm"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.min.css"
    />
    <style>
      body {
        background-color: #f8f9fa;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: #333;
        padding: 20px;
      }

      .container {
        background-color: rgba(255, 255, 255, 0.95);
        border-radius: 10px;
        padding: 30px;
        box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
        max-width: 95%;
        margin: 0 auto;
      }
      
      h1 {
        color: #007bff;
        margin-bottom: 10px;
      }
      
      .source-info {
        background-color: #e9ecef;
        padding: 10px 15px;
        border-radius: 5px;
        margin-bottom: 20px;
        font-size: 14px;
      }
      
      .btn-back {
        margin-bottom: 20px;
      }
      
      table.dataTable thead th {
        background-color: #007bff;
        color: white;
      }
      
      table.dataTable tbody tr:hover {
        background-color: #f1f1f1;
      }
    </style>
</head>

<body>
    <div class="container">
        <a href="/" class="btn btn-secondary btn-back">← Kembali ke Home</a>
        
        <h1>Hasil Scraping Data</h1>
        
        {% if source_url %}
        <div class="source-info">
            <strong>Source URL:</strong> <a href="{{ source_url }}" target="_blank">{{ source_url }}</a>
        </div>
        {% endif %}
        
        <div class="alert alert-info">
            Ditemukan <strong>{{ data|length }}</strong> item data.
        </div>

        <table id="resultTable" class="table table-striped table-bordered" style="width:100%">
            <thead>
                <tr>
                    {% for column in columns %}
                    <th>{{ column }}</th>
                    {% endfor %}
                </tr>
            </thead>
            <tbody>
                {% for row in data %}
                <tr>
                    {% for column in columns %}
                    <td>{{ row[column] }}</td>
                    {% endfor %}
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-pzjw8f+ua7Kw1TIq0c2zL1/4g2ntbdTz3x3/8d6D2pp2YyVOg5xt7fv7cQpzi9er"
      crossorigin="anonymous"
    ></script>
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
    
    <script>
        $(document).ready(function() {
            $('#resultTable').DataTable({
                pageLength: 10,
                language: {
                    search: "Cari:",
                    lengthMenu: "Tampilkan _MENU_ data per halaman",
                    info: "Menampilkan _START_ sampai _END_ dari _TOTAL_ data",
                    paginate: {
                        first: "Pertama",
                        last: "Terakhir",
                        next: "Berikutnya",
                        previous: "Sebelumnya"
                    },
                    zeroRecords: "Tidak ada data yang ditemukan",
                    infoEmpty: "Tidak ada data tersedia",
                    infoFiltered: "(difilter dari _MAX_ total data)"
                }
            });
        });
    </script>
</body>
</html>
